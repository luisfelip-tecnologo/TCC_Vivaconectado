<style>
    .banner-container {
        width: 100%;
        min-height: 250px;
        background: linear-gradient(135px, #007bff, #00bfff);
        color: white;
        position: relative;
        overflow: hidden;
        margin-bottom: 40px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
        
    .slide {
        display: none;
        width: 100%;
        animation: fadeIn 0.8s ease-in-out;
    }

    .slide.active {
        display: flex;
        align-items: center;
        justify-content: space-around;
        padding: 40px 10%;
    }

    .slide img {
        width: 150px;
        height: 150px;
        object-fit: cover;
        border-radius: 50%;
        border: 4px solid white;
        box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        margin-right: 30px;
    }

    .slide-texto {
        flex: 1;
        text-align: left;
    }

    .slide-texto h2 {
        font-size: 2.2rem;
        margin-bottom: 5px;
        color: white !important;
    }

    .slide-texto p {
        font-size: 1.1rem;
        opacity: 0.9;
        color: white !important;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>

<section class="banner-container">
    <div class="slide active">
        <img src="img/idosos.jpg" alt="Idosos felizes no notebook">
        <div class="slide-texto">
            <h2>Bem-vindo ao Viva Conectado</h2>
            <p>Conectando você ao mundo digital.</p>
        </div>
    </div>
    
    <div class="slide">
        <img src="img/apps.jpeg" alt="Ícones de redes sociais e bancos">
        <div class="slide-texto">
            <h2>Acessibilidade para Todos</h2>
            <p>Tutoriais simples sobre os principais serviços digitais.</p>
        </div>
    </div>
</section>

<script>
    (function() {
        const slides = document.querySelectorAll('.slide');
        let index = 0;

        if (slides.length > 0) {
            setInterval(() => {
                slides[index].classList.remove('active');
                index = (index + 1) % slides.length;
                slides[index].classList.add('active');
            }, 4000);
        }
    })();
</script>
