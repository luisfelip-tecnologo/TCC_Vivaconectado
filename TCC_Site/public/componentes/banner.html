<style>
.banner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 60px 8%;
    background: linear-gradient(135deg, #0f172a, #eafffe);
    color: #0f172a;
    flex-wrap: wrap;
}

.banner-texto {
    max-width: 500px;
}

.banner-texto span {
    font-size: 14px;
    letter-spacing: 2px;
    opacity: 0.7;
}

.banner-texto h1 {
    font-size: 48px;
    margin: 15px 0;
    font-weight: bold;
}

.banner-imagens {
    display: flex;
    align-items: center;
    gap: 20px;
}

.banner-imagens img {
    border-radius: 20px;
    object-fit: cover;
    box-shadow: 0 6px 20px rgba(0,0,0,0.2);
}

.img-circular {
    width: 220px;
    height: 220px;
    border-radius: 50%;
    border: 5px solid white;
}

.img-retangular {
    width: 220px;
    height: 140px;
    border-radius: 15px;
}

@media(max-width: 768px){
    .banner {
        flex-direction: column;
        text-align: center;
    }

    .banner-imagens {
        margin-top: 30px;
    }
}
</style>

<section class="banner">
    <div class="banner-texto">
        <span>VIVA CONECTADO</span>
        <h1>CONECTANDO VOCÊ<br>AO MUNDO DIGITAL</h1>
    </div>

    <div class="banner-imagens">
        <img src="img/idosos.jpg" class="img-circular" alt="Idosos usando notebook">
        <img src="img/apps.jpeg" class="img-retangular" alt="Apps">
    </div>
</section>
