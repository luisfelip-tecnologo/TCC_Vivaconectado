<style>
    .banner-container {
        width: 100%;
        min-height: 250px;
        background-color: #004aad !important; 
        color: #ffffff !important;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 40px 0;
        margin-top: 20px;
        margin-bottom: 40px;
        
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    .slide {
        display: none;
        width: 100%;
    }

    .slide.active {
        display: block;
        animation: fadeIn 0.5s;
    }

    .slide h2 {
        font-size: 2.5rem;
        font-weight: bold;
        margin-bottom: 15px;
        color: white !important;
    }

    .slide p {
        font-size: 1.2rem;
        color: white !important;
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }
</style>

<section class="banner-container">
    <div class="slide active">
        <h2>Bem-vindo ao Viva Conectado</h2>
        <p>A tecnologia a favor da sua independência digital.</p>
    </div>
    <div class="slide">
        <h2>Acessibilidade para Todos</h2>
        <p>Interface adaptada para facilitar sua navegação.</p>
    </div>
    <div class="slide">
        <h2>Aprenda e Conecte-se</h2>
        <p>Tutoriais simples sobre os principais serviços digitais.</p>
    </div>
</section>

<script>
    (function() {
        const slides = document.querySelectorAll('.slide');
        let index = 0;

        if (slides.length > 0) {
            setInterval(() => {
                slides[index].classList.remove('active');
                index = (index + 1) % slides.length;
                slides[index].classList.add('active');
            }, 4000);
        }
    })();
</script>
