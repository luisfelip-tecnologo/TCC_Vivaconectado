<style>
.banner-container {
        width: 100%;
        min-height: 300px; /* Para ele não ficar "esmagado" */
        background-color: #333;
        position: relative;
        overflow: hidden;
        border-radius: 10px; /* Um tchan no visual */
        margin: 20px 0;
    }

    .slide {
        display: none; /* Esconde todos os slides por padrão */
        text-align: center;
        padding: 50px;
        color: white;
    }

    .slide.active {
        display: block; /* Mostra só o slide ativo */
    }
</style>

<section class="banner-container">
    <div class="slide active">
        <h2>Bem-vindo ao Viva Conectado</h2>
        <p>A tecnologia a favor da sua independência digital.</p>
    </div>
    <div class="slide">
        <h2>Acessibilidade para Todos</h2>
        <p>Interface adaptada para facilitar sua navegação.</p>
    </div>
    <div class="slide">
        <h2>Aprenda e Conecte-se</h2>
        <p>Tutoriais simples sobre os principais serviços digitais.</p>
    </div>
</section>

<script>
    (function() {
        const slides = document.querySelectorAll('.slide');
        let index = 0;

        if (slides.length > 0) {
            setInterval(() => {
                slides[index].classList.remove('active');
                index = (index + 1) % slides.length;
                slides[index].classList.add('active');
            }, 4000);
        }
    })();
</script>
