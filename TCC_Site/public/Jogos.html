<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Jogos | Viva Conectado</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/Jogos.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>

<body>
<div id="header"></div>
<div id="navbar"></div>
    <main class="conteudo">

        <h2 class="titulo">Jogos Educativos</h2>
        <p class="subtitulo">
            Jogos desenvolvidos para estimular a memória e o raciocínio.
        </p>

        <div class="cards">

            <div class="card">
                <img src="img/jogo_Memoria.png">
                <h3>Jogo da Memória</h3>
                <p>Estimula a memória.</p>
                <a href="Jogo_Memoria.html">
                    <button class="btn-jogar">Jogar</button>
                </a>
            </div>

            <div class="card">
                <img src="img/Sudoku.png">
                <h3>Sudoku</h3>
                <p>Raciocínio lógico.</p>
                <a href="Sudoku.html">
                    <button class="btn-jogar">Jogar</button>
                </a>
            </div>

            <div class="card">
                <img src="img/Quebra_cabeça.png">
                <h3>Quebra-Cabeça</h3>
                <p>Resolução de problemas.</p>
                <a href="Quebra_cabeça.html">
                    <button class="btn-jogar">Jogar</button>
                </a>
            </div>

        </div>

    </main>

    <div id="footer"></div>
    <script type="module" src="main.js"></script>
    <script src="main.js/Acessibilidade.js"></script>    
    
    <script>
        async function carregar(id, arquivo) {
            try {
                const response = await fetch(arquivo);
                if (!response.ok) throw new Error("Erro ao carregar " + arquivo);
                const html = await response.text();
                document.getElementById(id).innerHTML = html;
                
                if (id === 'header') {
                    window.dispatchEvent(new Event('componentesCarregados'));
                }
            } catch (err) {
                console.error(err);
            }
        }

        carregar('header', 'componentes/header.html');
        carregar('navbar', 'componentes/navbar.html');
        carregar('banner', 'componentes/banner.html');
        carregar('footer', 'componentes/footer.html');
        
    </script>
    <script type="module" src="js/main.js"></script>
    <script src="js/acessibilidade.js"></script>

</body>
</html>
