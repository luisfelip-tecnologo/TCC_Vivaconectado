<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Recuperar Senha – Viva Conectado</title>

    

</head>

<body>

    <div class="recuperar-container">
        <img src="img/Logo_Preto.png" alt="Viva Conectado">

        <h2>Esqueci minha senha</h2>
        <p>Informe o e-mail cadastrado. Você receberá instruções para criar uma nova senha.</p>

        <form>
            <label for="email">E-mail</label>
            <input type="email" id="email" placeholder="Digite seu e-mail" required>

            <button class="btn-recuperar" type="submit">Enviar instruções</button>
        </form>

        <div class="voltar">
            <span>Já possui uma conta? <a href="login.html">Entrar</a></span>
        </div>
    </div>

</body>

</html>
