<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Criar Conta | Viva Conectado</title>

<link rel="stylesheet" href="css/style.css">

<style>
body {
  background: #f0f4f8;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.cadastro-box {
  background: #fff;
  padding: 35px;
  border-radius: 20px;
}
</style>
</head>

<body>

<div class="cadastro-box">
  <img src="img/Logo_Preto.png" width="100">
  <h1>Criar Conta</h1>

  <p id="mensagem" style="color:red;"></p>

  <input type="text" id="nome" placeholder="Digite seu nome">
  <input type="email" id="email" placeholder="Digite seu e-mail">
  <input type="password" id="senha" placeholder="Crie uma senha">
  <input type="password" id="confirmar" placeholder="Confirme a senha">

  <button id="btnCadastro">Criar Conta</button>

  <p>Já tem conta? <a href="login.html">Entrar</a></p>
</div>

<script type="module" src="js/cadastro.js"></script>

</body>
</html>
