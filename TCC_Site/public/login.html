<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar | Viva Conectado</title>

  <link rel="stylesheet" href="css/style.css">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:Arial; }
    body {
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background: linear-gradient(135deg, #0f172a, #1e293b);
    }
    .login-box {
      background:#fff;
      width:380px;
      padding:110px 35px 45px;
      border-radius:18px;
      box-shadow:0 15px 35px rgba(0,0,0,0.25);
      text-align:center;
      position:relative;
    }
    .login-box img {
      width:140px;
      position:absolute;
      top:5px;
      left:50%;
      transform:translateX(-50%);
    }
    input {
      width:100%;
      padding:14px;
      margin-bottom:18px;
      border-radius:10px;
      border:1px solid #cbd5e1;
    }
    .btn-login {
      width:100%;
      padding:14px;
      background:#2563eb;
      color:#fff;
      border:none;
      border-radius:12px;
      font-size:18px;
      cursor:pointer;
    }
  </style>
</head>

<body>

<div class="login-box">
    <img src="img/Logo_Preto.png">
    <h2>Acesse sua conta</h2>

    <input type="email" id="email" placeholder="Digite seu e-mail">
    <input type="password" id="senha" placeholder="Digite sua senha">

    <button class="btn-login" id="btnLogin">Entrar</button>

    <p id="mensagem" style="margin-top:15px; color:red;"></p>

    <div class="links">
        <a href="cadastro.html">Criar uma conta</a>
        <a href="#">Esqueci minha senha</a>
    </div>
</div>

<!-- JS -->
<script type="module" src="js/login.js"></script>

</body>
</html>
